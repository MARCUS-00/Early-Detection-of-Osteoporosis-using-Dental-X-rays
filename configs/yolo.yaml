# YOLOv8 ROI detection hyperparameters — sourced from ROI_Extraction.ipynb
# Two configurations observed in the source notebook are listed below.
# Default values correspond to Config A.

# Model
base_weights: "yolov8n.pt"

# Class
num_classes: 1
class_names:
  - "cortex_roi"

# Config A (default — as used in first YOLO train call in notebook)
epochs: 50
imgsz: 1024
batch: 2

# Config B (second YOLO train call in notebook)
# Uncomment and use these values to replicate the second run:
# epochs: 30
# imgsz: 640
# batch: 8

# Inference
conf_threshold: 0.1   # used in both model.predict() and the keep-filter

# Paths (user must configure)
data_yaml: ""         # path to Roboflow YOLOv8-format data.yaml
model_path: ""        # path to trained weights (.pt)
output_dir: "runs/detect"
