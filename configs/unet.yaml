# U-Net hyperparameters — sourced from Unet_Extraction.ipynb

# Architecture
in_channels: 3
out_channels: 1
features: [64, 128, 256, 512]

# Preprocessing / dataset
target_h: 100
target_w: 100

# Training
epochs: 20
learning_rate: 0.001    # Adam lr=1e-3
val_split: 0.2          # 80/20 random_split as in source
batch_size: 4

# Output filenames (one per side/mode)
output_filenames:
  left: "unet_roi_left.pth"
  right: "unet_roi_right.pth"
  general: "unet_roi_general.pth"

# NOTE: One left-side training run in the source notebook diverged
# (loss ≈ 2.0254). This is recorded for reproducibility; the training
# code is not modified.

# Paths (user must configure)
images_dir: ""
masks_dir: ""
